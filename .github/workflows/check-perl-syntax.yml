name: Check parser syntax in perl

on:
  push: 
    branches-ignore: [ "master" ]
  pull_request:
    branches: [ "master" ] 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      plFile: "log_preparse.pl"
    steps:
      - name: Parse syntax of perl script file
        run: |
          echo ${{ env:plFile }}
          perl -c ${{ env:plFile }}
